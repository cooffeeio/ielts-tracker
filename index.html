<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1E3A5F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IELTSTracker" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>IELTS Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F8FAFC; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Helvetica Neue', sans-serif;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    select, input, textarea, button { font-family: inherit; }
    textarea { resize: vertical; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  'use strict';

  // ── Service Worker 登録 ───────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  // ── React / Recharts エイリアス ───────────────────────
  const {
    useState, useMemo, useEffect, useCallback,
    createElement: h, Fragment,
  } = React;

  const {
    LineChart, Line, XAxis, YAxis, CartesianGrid,
    Tooltip, Legend, ResponsiveContainer,
    BarChart, Bar, Cell, PieChart, Pie,
    RadarChart, Radar, PolarGrid, PolarAngleAxis,
  } = Recharts;

  // ── 定数 ─────────────────────────────────────────────
  const SECTIONS   = ['Listening','Reading','Writing','Speaking'];
  const BAND_SCORES = Array.from({length:19},(_,i)=>(i*0.5).toFixed(1));
  const FIXED_TAGS = [
    '語彙不足','文法エラー','パラフレーズ見落とし','タイムマネジメント',
    '発音・流暢さ','スペルミス','論理構成','スキャニング不足',
    'ディテール聞き逃し','接続詞の誤用',
  ];
  const SPEAKING_SUB = ['流暢さ・一貫性','語彙力','文法の幅と正確さ','発音'];
  const WRITING_SUB  = ['タスク達成度','一貫性・結束性','語彙力','文法の幅と正確さ'];
  const SECTION_COLOR = {
    Listening:'#2563EB', Reading:'#10B981',
    Writing:'#F59E0B',   Speaking:'#8B5CF6', Overall:'#1E3A5F',
  };
  const TAG_COLORS = [
    '#2563EB','#10B981','#F59E0B','#8B5CF6','#EF4444',
    '#06B6D4','#EC4899','#84CC16','#F97316','#6366F1',
  ];
  const SK = { entries:'ielts_entries', tags:'ielts_custom_tags' };

  // ── localStorage フック ───────────────────────────────
  function useLS(key, def) {
    const [v, setV] = useState(() => {
      try { const s=localStorage.getItem(key); return s?JSON.parse(s):def; } catch { return def; }
    });
    const set = useCallback(fn => {
      setV(prev => {
        const next = typeof fn==='function'?fn(prev):fn;
        try { localStorage.setItem(key,JSON.stringify(next)); } catch {}
        return next;
      });
    }, [key]);
    return [v, set];
  }

  // ── ヘルパー ─────────────────────────────────────────
  function calcOverall(L,R,W,S){
    return Math.round((+L + +R + +W + +S)/4/0.5)*0.5;
  }
  function getSessions(entries){
    const byDate={};
    entries.forEach(e=>{
      if(!byDate[e.date]) byDate[e.date]={};
      byDate[e.date][e.section]=+e.bandScore;
    });
    return Object.entries(byDate)
      .filter(([,s])=>SECTIONS.every(k=>s[k]!=null))
      .sort(([a],[b])=>a.localeCompare(b))
      .map(([date,s])=>({
        date:date.slice(5),
        Listening:s.Listening, Reading:s.Reading,
        Writing:s.Writing,     Speaking:s.Speaking,
        Overall:calcOverall(s.Listening,s.Reading,s.Writing,s.Speaking),
      }));
  }
  function getTagFreq(entries, customTags){
    const all=[...FIXED_TAGS,...customTags], freq={};
    all.forEach(t=>{ freq[t]=0; });
    entries.forEach(e=>e.errorTags.forEach(t=>{ freq[t]=(freq[t]||0)+1; }));
    return Object.entries(freq).filter(([,v])=>v>0)
      .sort((a,b)=>b[1]-a[1]).map(([tag,count])=>({tag,count}));
  }

  // ── 共通スタイル ──────────────────────────────────────
  const card = {
    background:'#fff', borderRadius:16, padding:'20px',
    border:'1px solid #E2E8F0', marginBottom:16,
  };
  const inp = {
    width:'100%', border:'1.5px solid #E2E8F0', borderRadius:10,
    padding:'11px 14px', fontSize:15, color:'#1E3A5F',
    background:'#F8FAFC', outline:'none', WebkitAppearance:'none',
    boxSizing:'border-box',
  };
  const lbl = {
    fontSize:12, fontWeight:600, color:'#64748B',
    marginBottom:7, display:'block',
  };

  // ── Tooltip ───────────────────────────────────────────
  function CT({active,payload,label}){
    if(!active||!payload?.length) return null;
    return h('div',{style:{background:'#fff',border:'1px solid #E2E8F0',borderRadius:10,padding:'10px 14px',boxShadow:'0 4px 16px rgba(0,0,0,.08)'}},
      h('div',{style:{fontWeight:700,color:'#1E3A5F',marginBottom:6,fontSize:13}},label),
      payload.map(p=>h('div',{key:p.dataKey,style:{display:'flex',alignItems:'center',gap:6,fontSize:12,marginBottom:2}},
        h('span',{style:{width:8,height:8,borderRadius:'50%',background:p.color,display:'inline-block'}}),
        h('span',{style:{color:'#64748B'}},p.dataKey+':'),
        h('span',{style:{fontWeight:600,color:'#1E3A5F'}},p.value)
      ))
    );
  }

  // ── Dashboard ─────────────────────────────────────────
  function Dashboard({entries}){
    const sessions   = useMemo(()=>getSessions(entries),[entries]);
    const recent3    = sessions.slice(-3);
    const avgOverall = recent3.length
      ? (recent3.reduce((s,r)=>s+r.Overall,0)/recent3.length).toFixed(1) : null;
    const avgSec = SECTIONS.reduce((acc,s)=>{
      const v=recent3.map(r=>r[s]).filter(Boolean);
      acc[s]=v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):null;
      return acc;
    },{});

    return h(Fragment,null,
      // Hero
      h('div',{style:{
        background:'linear-gradient(135deg,#1E3A5F 0%,#2563EB 100%)',
        borderRadius:20, padding:'28px 24px 32px', marginBottom:16,
        color:'#fff', boxShadow:'0 8px 32px rgba(37,99,235,.25)',
      }},
        h('div',{style:{fontSize:11,opacity:.65,letterSpacing:1.5,textTransform:'uppercase',marginBottom:4}},'直近3回の平均 Overall'),
        h('div',{style:{display:'flex',alignItems:'flex-end',gap:10,marginBottom:20}},
          h('span',{style:{fontSize:80,fontWeight:800,lineHeight:1,letterSpacing:-3}}, avgOverall??'—'),
          h('span',{style:{fontSize:18,opacity:.6,marginBottom:12}},'/ 9.0')
        ),
        // band bar
        h('div',{style:{position:'relative',height:12,background:'rgba(255,255,255,.2)',borderRadius:6,marginBottom:8}},
          h('div',{style:{position:'absolute',left:0,top:0,height:'100%',width:`${((+avgOverall||0)/9)*100}%`,background:'rgba(255,255,255,.85)',borderRadius:6,transition:'width .4s'}}),
          ...[{v:6.5},{v:8.0}].map(({v})=>h('div',{key:v,style:{position:'absolute',left:`${(v/9)*100}%`,top:-4,transform:'translateX(-50%)'}},
            h('div',{style:{width:2,height:20,background:'rgba(255,255,255,.5)',borderRadius:1}}),
            h('div',{style:{position:'absolute',top:20,left:'50%',transform:'translateX(-50%)',fontSize:9,color:'rgba(255,255,255,.6)',whiteSpace:'nowrap'}},v)
          ))
        ),
        h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:20,gap:8}},
          SECTIONS.map(s=>h('div',{key:s,style:{flex:'1 1 0'}},
            h('div',{style:{fontSize:10,opacity:.55,marginBottom:2}},s[0]),
            h('div',{style:{fontSize:26,fontWeight:700}},avgSec[s]??'—'),
            h('div',{style:{height:3,background:'rgba(255,255,255,.2)',borderRadius:2,marginTop:4}},
              h('div',{style:{height:'100%',width:`${((+avgSec[s]||0)/9)*100}%`,background:'#fff',borderRadius:2,transition:'width .4s'}})
            )
          ))
        )
      ),
      // Mini stats
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12,marginBottom:16}},
        [
          {label:'総記録数',  value:entries.length,                            unit:'件'},
          {label:'要復習',    value:entries.filter(e=>e.needsReview).length,   unit:'件'},
          {label:'受験回数',  value:sessions.length,                           unit:'回'},
          {label:'目標まで',  value:avgOverall?Math.max(0,6.5-(+avgOverall)).toFixed(1):'—', unit:'バンド'},
        ].map(({label,value,unit})=>h('div',{key:label,style:{...card,marginBottom:0,padding:'16px 18px'}},
          h('div',{style:{fontSize:11,color:'#94A3B8',marginBottom:4}},label),
          h('div',{style:{fontSize:30,fontWeight:800,color:'#1E3A5F',letterSpacing:-1}},
            value, h('span',{style:{fontSize:12,fontWeight:400,color:'#94A3B8',marginLeft:3}},unit)
          )
        ))
      ),
      // Chart
      h('div',{style:card},
        h('div',{style:{fontWeight:700,color:'#1E3A5F',fontSize:15,marginBottom:16}},'スコア推移'),
        sessions.length===0
          ? h('div',{style:{textAlign:'center',color:'#94A3B8',padding:'48px 0',fontSize:14}},
              h('div',{style:{fontSize:36,marginBottom:10}},'📈'),
              'L / R / W / S を同日に記録するとグラフが表示されます'
            )
          : h(ResponsiveContainer,{width:'100%',height:240},
              h(LineChart,{data:sessions,margin:{top:5,right:8,left:-24,bottom:5}},
                h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#F1F5F9'}),
                h(XAxis,{dataKey:'date',tick:{fontSize:10,fill:'#94A3B8'}}),
                h(YAxis,{domain:[4,9],ticks:[4,5,6,7,8,9],tick:{fontSize:10,fill:'#94A3B8'}}),
                h(Tooltip,{content:h(CT)}),
                h(Legend,{wrapperStyle:{fontSize:11}}),
                ...SECTIONS.map(s=>h(Line,{key:s,type:'monotone',dataKey:s,stroke:SECTION_COLOR[s],strokeWidth:2,dot:{r:3},activeDot:{r:5}})),
                h(Line,{type:'monotone',dataKey:'Overall',stroke:SECTION_COLOR.Overall,strokeWidth:3,dot:{r:4},activeDot:{r:6},strokeDasharray:'6 2'})
              )
            )
      )
    );
  }

  // ── Log Entry ─────────────────────────────────────────
  function LogEntry({setEntries, customTags, setCustomTags}){
    const today = new Date().toISOString().slice(0,10);
    const [form,setForm] = useState({
      date:today, section:'Listening', bandScore:'6.0',
      subScores:{}, errorTags:[], myAnswer:'', correction:'', needsReview:false,
    });
    const [newTag,setNewTag] = useState('');
    const [saved,setSaved]   = useState(false);

    const subKeys = form.section==='Speaking'?SPEAKING_SUB:form.section==='Writing'?WRITING_SUB:[];
    const allTags = [...FIXED_TAGS,...customTags];

    function toggleTag(tag){
      setForm(f=>({...f,errorTags:f.errorTags.includes(tag)?f.errorTags.filter(t=>t!==tag):[...f.errorTags,tag]}));
    }
    function addCustomTag(){
      const t=newTag.trim();
      if(t&&!allTags.includes(t)){ setCustomTags(p=>[...p,t]); setForm(f=>({...f,errorTags:[...f.errorTags,t]})); }
      setNewTag('');
    }
    function handleSave(){
      if(!form.bandScore) return;
      setEntries(p=>[...p,{...form,id:Date.now()}]);
      setForm({date:today,section:'Listening',bandScore:'6.0',subScores:{},errorTags:[],myAnswer:'',correction:'',needsReview:false});
      setSaved(true); setTimeout(()=>setSaved(false),2000);
    }

    return h('div',{style:card},
      h('div',{style:{fontWeight:800,color:'#1E3A5F',fontSize:17,marginBottom:20}},'学習・スコア記録'),

      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}},
        h('div',null, h('label',{style:lbl},'日付'),
          h('input',{type:'date',value:form.date,style:inp, onChange:e=>setForm(f=>({...f,date:e.target.value}))})),
        h('div',null, h('label',{style:lbl},'セクション'),
          h('select',{value:form.section,style:inp, onChange:e=>setForm(f=>({...f,section:e.target.value,subScores:{}}))},
            SECTIONS.map(s=>h('option',{key:s},s))
          ))
      ),

      h('div',{style:{marginBottom:16}},
        h('label',{style:lbl},`バンドスコア（${form.section}）`),
        h('select',{value:form.bandScore,style:{...inp,fontWeight:700,fontSize:18}, onChange:e=>setForm(f=>({...f,bandScore:e.target.value}))},
          BAND_SCORES.map(s=>h('option',{key:s,value:s},s))
        )
      ),

      subKeys.length>0&&h('div',{style:{background:'#F8FAFC',borderRadius:12,padding:16,marginBottom:16,border:'1px solid #E2E8F0'}},
        h('div',{style:{fontSize:12,fontWeight:600,color:'#64748B',marginBottom:12}},'内部スコア（任意）'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}},
          subKeys.map(k=>h('div',{key:k},
            h('label',{style:{...lbl,fontSize:11}},k),
            h('select',{value:form.subScores[k]||'',style:{...inp,fontSize:13}, onChange:e=>setForm(f=>({...f,subScores:{...f.subScores,[k]:e.target.value}}))},
              h('option',{value:''},'—'),
              BAND_SCORES.map(s=>h('option',{key:s,value:s},s))
            )
          ))
        ),
        subKeys.every(k=>form.subScores[k])&&h(ResponsiveContainer,{width:'100%',height:160},
          h(RadarChart,{data:subKeys.map(k=>({subject:k.replace(/・/g,'/'),value:+form.subScores[k]}))},
            h(PolarGrid,{stroke:'#E2E8F0'}),
            h(PolarAngleAxis,{dataKey:'subject',tick:{fontSize:10,fill:'#64748B'}}),
            h(Radar,{dataKey:'value',stroke:'#2563EB',fill:'#2563EB',fillOpacity:0.15})
          )
        )
      ),

      h('div',{style:{marginBottom:16}},
        h('label',{style:lbl},'エラー原因タグ'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:7,marginBottom:10}},
          allTags.map((tag,i)=>h('button',{
            key:tag, onClick:()=>toggleTag(tag),
            style:{
              padding:'6px 13px', borderRadius:20, fontSize:12, cursor:'pointer', border:'none',
              background:form.errorTags.includes(tag)?TAG_COLORS[i%TAG_COLORS.length]:'#F1F5F9',
              color:form.errorTags.includes(tag)?'#fff':'#64748B',
              fontWeight:form.errorTags.includes(tag)?700:400,
            },
          },tag))
        ),
        h('div',{style:{display:'flex',gap:8}},
          h('input',{value:newTag,placeholder:'タグを追加… (Enter)',style:{...inp,flex:1},
            onChange:e=>setNewTag(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&addCustomTag()}),
          h('button',{onClick:addCustomTag,style:{padding:'11px 16px',background:'#2563EB',color:'#fff',border:'none',borderRadius:10,fontSize:13,cursor:'pointer',fontWeight:600,whiteSpace:'nowrap'}},'追加')
        )
      ),

      ...[
        {label:'間違えた問題 / 自分の解答', key:'myAnswer',   ph:"例：Q32で 'Thursday' と答えたが…"},
        {label:'正答 / 添削・改善案',       key:'correction', ph:"例：正解は 'Tuesday'。曜日は聞いた瞬間に書く。"},
      ].map(({label,key,ph})=>h('div',{key,style:{marginBottom:16}},
        h('label',{style:lbl},label),
        h('textarea',{rows:4,placeholder:ph,value:form[key],style:inp,
          onChange:e=>setForm(f=>({...f,[key]:e.target.value}))})
      )),

      h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:24}},
        h('input',{type:'checkbox',id:'rev',checked:form.needsReview,
          onChange:e=>setForm(f=>({...f,needsReview:e.target.checked})),
          style:{width:20,height:20,accentColor:'#2563EB',cursor:'pointer'}}),
        h('label',{htmlFor:'rev',style:{fontSize:15,color:'#1E3A5F',cursor:'pointer'}},'復習が必要')
      ),

      h('button',{onClick:handleSave,style:{
        width:'100%', padding:16,
        background:saved?'#10B981':'linear-gradient(135deg,#1E3A5F,#2563EB)',
        color:'#fff', border:'none', borderRadius:12, fontSize:16, fontWeight:700,
        cursor:'pointer', boxShadow:'0 4px 16px rgba(37,99,235,.3)',
      }},saved?'✓ 保存しました':'保存する')
    );
  }

  // ── Review & Analytics ───────────────────────────────
  function Review({entries, customTags}){
    const [filter,setFilter] = useState('all');
    const tagData  = useMemo(()=>getTagFreq(entries,customTags),[entries,customTags]);
    const reviewed = entries.filter(e=>e.needsReview);
    const filtered = filter==='all'?reviewed:reviewed.filter(e=>e.section===filter);

    return h(Fragment,null,
      h('div',{style:card},
        h('div',{style:{fontWeight:700,color:'#1E3A5F',fontSize:15,marginBottom:16}},'弱点タグ分析'),
        tagData.length===0
          ? h('div',{style:{textAlign:'center',color:'#94A3B8',padding:'48px 0',fontSize:14}},
              h('div',{style:{fontSize:36,marginBottom:10}},'🏷️'),
              'エラータグを記録するとここに集計されます'
            )
          : h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,alignItems:'center'}},
              h(ResponsiveContainer,{width:'100%',height:200},
                h(BarChart,{data:tagData.slice(0,7),layout:'vertical',margin:{left:4,right:16}},
                  h(CartesianGrid,{strokeDasharray:'3 3',horizontal:false,stroke:'#F1F5F9'}),
                  h(XAxis,{type:'number',tick:{fontSize:10,fill:'#94A3B8'}}),
                  h(YAxis,{type:'category',dataKey:'tag',tick:{fontSize:9,fill:'#64748B'},width:82}),
                  h(Tooltip,{content:({active,payload})=>active&&payload?.length
                    ?h('div',{style:{background:'#fff',border:'1px solid #E2E8F0',borderRadius:8,padding:'7px 12px',fontSize:12}},
                        payload[0].payload.tag,': ',h('b',null,payload[0].value,'回')):null}),
                  h(Bar,{dataKey:'count',radius:[0,6,6,0]},
                    tagData.slice(0,7).map((_,i)=>h(Cell,{key:i,fill:TAG_COLORS[i%TAG_COLORS.length]}))
                  )
                )
              ),
              h(ResponsiveContainer,{width:'100%',height:200},
                h(PieChart,null,
                  h(Pie,{data:tagData.slice(0,6),dataKey:'count',nameKey:'tag',cx:'50%',cy:'50%',outerRadius:70,
                    label:({percent})=>`${(percent*100).toFixed(0)}%`,labelLine:false},
                    tagData.slice(0,6).map((_,i)=>h(Cell,{key:i,fill:TAG_COLORS[i%TAG_COLORS.length]}))
                  ),
                  h(Tooltip,{content:({active,payload})=>active&&payload?.length
                    ?h('div',{style:{background:'#fff',border:'1px solid #E2E8F0',borderRadius:8,padding:'7px 12px',fontSize:12}},
                        payload[0].name,': ',h('b',null,payload[0].value,'回')):null})
                )
              )
            )
      ),

      h('div',{style:card},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}},
          h('div',{style:{fontWeight:700,color:'#1E3A5F',fontSize:15}},
            '要復習リスト ',
            h('span',{style:{fontWeight:400,color:'#94A3B8',fontSize:13}},`(${filtered.length}件)`)
          ),
          h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
            ['all',...SECTIONS].map(s=>h('button',{
              key:s, onClick:()=>setFilter(s),
              style:{padding:'5px 12px',borderRadius:20,fontSize:12,cursor:'pointer',border:'1px solid',
                background:filter===s?'#2563EB':'transparent',
                borderColor:filter===s?'#2563EB':'#E2E8F0',
                color:filter===s?'#fff':'#64748B'},
            },s==='all'?'すべて':s[0]))
          )
        ),

        filtered.length===0
          ? h('div',{style:{textAlign:'center',color:'#94A3B8',padding:'48px 0',fontSize:14}},
              h('div',{style:{fontSize:36,marginBottom:10}},reviewed.length===0?'📝':'🎉'),
              reviewed.length===0?'「復習が必要」をオンにした記録がここに表示されます':'このセクションの要復習記録はありません'
            )
          : h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
              [...filtered].reverse().map(e=>h('div',{key:e.id,style:{border:'1px solid #E2E8F0',borderRadius:14,padding:16,background:'#FAFCFF'}},
                h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:6}},
                  h('div',{style:{display:'flex',alignItems:'center',gap:8}},
                    h('span',{style:{background:SECTION_COLOR[e.section],color:'#fff',fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:20}},e.section),
                    h('span',{style:{fontSize:11,color:'#94A3B8'}},e.date)
                  ),
                  h('span',{style:{fontSize:20,fontWeight:800,color:SECTION_COLOR[e.section]}},`Band ${e.bandScore}`)
                ),
                e.errorTags.length>0&&h('div',{style:{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}},
                  e.errorTags.map((t,i)=>h('span',{key:t,style:{
                    background:TAG_COLORS[i%TAG_COLORS.length]+'20',
                    color:TAG_COLORS[i%TAG_COLORS.length],
                    fontSize:11,padding:'2px 9px',borderRadius:20,fontWeight:600,
                  }},t))
                ),
                h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
                  [
                    {label:'自分の解答',  content:e.myAnswer,   bg:'#FEF9C3'},
                    {label:'添削・改善案',content:e.correction, bg:'#DCFCE7'},
                  ].map(({label,content,bg})=>content?h('div',{key:label,style:{background:bg,borderRadius:8,padding:'10px 12px'}},
                    h('div',{style:{fontSize:10,fontWeight:700,color:'#64748B',marginBottom:4,textTransform:'uppercase',letterSpacing:.5}},label),
                    h('div',{style:{fontSize:12,color:'#1E3A5F',lineHeight:1.65}},content)
                  ):null)
                )
              ))
            )
      )
    );
  }

  // ── App ───────────────────────────────────────────────
  function App(){
    const [tab, setTab]             = useState('dashboard');
    const [entries, setEntries]     = useLS(SK.entries, []);
    const [customTags,setCustomTags]= useLS(SK.tags, []);

    const tabs = [
      {id:'dashboard',emoji:'📊',label:'Dashboard'},
      {id:'log',      emoji:'✏️',label:'Log'},
      {id:'review',   emoji:'🔍',label:'Review'},
    ];

    return h('div',{style:{
      minHeight:'100dvh', background:'#F8FAFC',
      paddingBottom:'calc(72px + env(safe-area-inset-bottom))',
    }},
      // Header
      h('div',{style:{
        background:'#fff', borderBottom:'1px solid #E2E8F0',
        position:'sticky', top:0, zIndex:100,
        paddingTop:'env(safe-area-inset-top)',
      }},
        h('div',{style:{maxWidth:600,margin:'0 auto',padding:'0 20px',display:'flex',alignItems:'center',height:52}},
          h('div',{style:{fontWeight:900,color:'#1E3A5F',fontSize:17,letterSpacing:-.5}},
            'IELTS',h('span',{style:{color:'#2563EB'}},'Tracker')
          )
        )
      ),
      // Content
      h('div',{style:{maxWidth:600,margin:'0 auto',padding:'20px 16px 16px'}},
        tab==='dashboard'&&h(Dashboard,{entries}),
        tab==='log'      &&h(LogEntry,{setEntries,customTags,setCustomTags}),
        tab==='review'   &&h(Review,{entries,customTags}),
      ),
      // Bottom tab bar
      h('div',{style:{
        position:'fixed',bottom:0,left:0,right:0,zIndex:200,
        background:'rgba(255,255,255,.92)',backdropFilter:'blur(20px)',
        WebkitBackdropFilter:'blur(20px)',
        borderTop:'1px solid rgba(0,0,0,.08)',
        paddingBottom:'env(safe-area-inset-bottom)',
        display:'flex',
      }},
        h('div',{style:{maxWidth:600,margin:'0 auto',width:'100%',display:'flex'}},
          tabs.map(t=>h('button',{
            key:t.id, onClick:()=>setTab(t.id),
            style:{flex:1,padding:'10px 0 8px',border:'none',background:'transparent',
              cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3},
          },
            h('span',{style:{fontSize:22}},t.emoji),
            h('span',{style:{fontSize:10,fontWeight:tab===t.id?700:400,color:tab===t.id?'#2563EB':'#94A3B8'}},t.label),
            tab===t.id&&h('div',{style:{width:4,height:4,borderRadius:2,background:'#2563EB'}})
          ))
        )
      )
    );
  }

  // ── Mount ─────────────────────────────────────────────
  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
})();
</script>
</body>
</html>
